<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 340px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e4e4e7; padding: 20px; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .header img { width: 28px; height: 28px; border-radius: 6px; }
    .header h1 { font-size: 15px; font-weight: 700; }
    .status { padding: 10px 12px; border-radius: 8px; font-size: 12px; margin-bottom: 12px; }
    .status.connected { background: #064e3b; border: 1px solid #059669; }
    .status.disconnected { background: #1c1917; border: 1px solid #44403c; }
    .status.syncing { background: #1e1b4b; border: 1px solid #6366f1; }
    label { display: block; font-size: 11px; color: #a1a1aa; margin-bottom: 4px; font-weight: 500; }
    input { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #27272a; background: #18181b; color: #e4e4e7; font-size: 12px; margin-bottom: 12px; }
    input:focus { outline: none; border-color: #6366f1; }
    button { width: 100%; padding: 9px; border-radius: 6px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
    button:hover { opacity: 0.9; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-danger { background: #dc2626; color: white; margin-top: 8px; }
    .btn-secondary { background: #27272a; color: #a1a1aa; margin-top: 8px; }
    .info { font-size: 10px; color: #71717a; margin-top: 12px; text-align: center; line-height: 1.5; }
    .last-sync { font-size: 10px; color: #71717a; margin-top: 4px; }
    #sync-log { font-size: 10px; color: #a1a1aa; margin-top: 8px; max-height: 80px; overflow-y: auto; background: #18181b; border-radius: 6px; padding: 8px; display: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>AURA Connect Analytics</h1>
  </div>

  <div id="setup-view">
    <div class="status disconnected" id="status-box">
      <strong>Not connected</strong> — Enter your AURA credentials below.
    </div>
    <label>Supabase Project URL</label>
    <input type="text" id="supabase-url" placeholder="https://wxastapzvnktttlhaiwe.supabase.co" />
    <label>Your AURA Session Token (JWT)</label>
    <input type="password" id="jwt-token" placeholder="Paste your session token" />
    <button class="btn-primary" id="save-btn">Connect & Sync</button>
    <p class="info">
      Find your token: AURA Connect → Settings → Developer → Copy Session Token
    </p>
  </div>

  <div id="connected-view" style="display:none;">
    <div class="status connected" id="connected-status">
      <strong>✓ Connected to AURA</strong>
      <div class="last-sync" id="last-sync-time"></div>
    </div>
    <button class="btn-primary" id="sync-now-btn">Sync Now</button>
    <button class="btn-secondary" id="view-log-btn">View Sync Log</button>
    <div id="sync-log"></div>
    <button class="btn-danger" id="disconnect-btn">Disconnect</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
